name: Deploy Games

on:
  workflow_call:
    inputs:
      environment:
        description: Target deployment environment (dev or prod)
        required: true
        type: string

concurrency:
  group: deploy-games-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ vars.GAMES_SITE_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends binaryen

      - name: Build game bundles
        run: node web/scripts/build-games.mjs --out games-dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy games-dist --project-name=${{ vars.CF_GAMES_PROJECT }} --branch=${{ github.ref_name }}
