name: Deploy - prod

on:
  push:
    branches: [prod]
    paths:
      - 'web/**'
      - '!web/scripts/build-games.mjs'
      - '!web/public/games/_shared/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/deploy-web.yml'
      - '.github/workflows/deploy-web-prod.yml'
      - '.github/workflows/ci.yml'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    uses: ./.github/workflows/deploy-web.yml
    with:
      environment: prod
    secrets: inherit
